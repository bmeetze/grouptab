name: Supabase keep-alive
on:
  schedule:
    - cron: '17 8 * * 1,4'   # Mon & Thu 08:17 UTC — twice weekly, well inside the 7-day pause window
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive RPC
        run: |
          curl -sf -X POST "$SUPABASE_URL/rest/v1/rpc/keepalive" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" -d '{}'
        env:
          SUPABASE_URL: https://fsxgzverfxtrqludigdo.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_MnzXAf0p-6ariSDD00jVwQ_-I4dYPHb
